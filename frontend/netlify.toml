# Matches Netlify UI: Base directory = "frontend". Publish is this folder's dist/ output.
[build]
  command = "npm install && npm run build"
  publish = "dist"

# Avoid stale SPA shell after deploys (assets keep content-hashed names from Vite).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Same-origin /api → Render (browser never calls Render directly → no CORS).
[[redirects]]
  from = "/api/*"
  to = "https://event-management-system-i0hm.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
